<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angry IPSW Fetcher</title>
	<link rel="icon" type="image/x-icon" href="icon.ico">
    <style>
        :root {
            /* CHANGE BACKGROUND IMAGE HERE */
            --bg-image: url('bg.jpg');
            --glass: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background: var(--bg-image) no-repeat center center fixed;
            background-size: cover;
            color: var(--text);
            display: flex;
            justify-content: center;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.5);
            min-height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .app-container {
            width: 100%;
            max-width: 600px;
        }

        header { text-align: center; margin-bottom: 40px; }
        h1 { font-weight: 200; font-size: 2.5rem; margin: 0; }
        p.subtitle { opacity: 0.6; font-size: 0.9rem; margin-top: 5px; }

        /* Controls */
        .controls {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }

        select, input {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            margin-bottom: 15px;
            box-sizing: border-box;
            outline: none;
        }

        select option { background: #222; }

        .btn-row { display: flex; gap: 10px; }
        button {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .primary-btn { background: #ffffff; color: #000; }
        .primary-btn:hover { background: #e0e0e0; }
        
        .toggle-btn { 
            background: transparent; 
            border: 1px solid rgba(255,255,255,0.3); 
            color: white; 
            font-size: 0.8rem;
        }

        /* Firmware List */
        .firmware-list { margin-top: 20px; }
        .fw-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .fw-name { font-weight: 500; display: flex; align-items: center; gap: 10px; }
        .fw-meta { font-size: 0.75rem; opacity: 0.5; }
        
        .status-dot { width: 8px; height: 8px; border-radius: 50%; }
        .signed { background: #4ade80; box-shadow: 0 0 8px #4ade80; }
        .unsigned { background: #f87171; }

        .dl-icon {
            color: white;
            text-decoration: none;
            font-size: 0.8rem;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 4px 12px;
            border-radius: 20px;
        }
        .dl-icon:hover { background: white; color: black; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="overlay">
    <div class="app-container">
        <header>
            <h1>Hello,</h1>
            <h1>Angry IPSW Fetcher</h1>
            <p class="subtitle">Direct downloads from Apple servers</p>
			<p class="subtitle">Made with ❤️ by PwntrickSt4r.</p>
        </header>

        <div class="controls">
            <div id="standardMode">
                <select id="deviceSelect">
                    <option value="">Loading devices...</option>
                </select>
            </div>
            
            <div id="advancedMode" class="hidden">
                <input type="text" id="manualInput" placeholder="Enter Identifier (e.g. iPhone13,3)">
            </div>

            <div class="btn-row">
                <button class="primary-btn" onclick="search()">Search Firmwares</button>
                <button class="toggle-btn" onclick="toggleMode()" id="modeLabel">Enter Device ID</button>
            </div>
        </div>

        <div id="results" class="firmware-list"></div>
    </div>
</div>

<script>
    let isAdvanced = false;

    window.onload = async () => {
        const select = document.getElementById('deviceSelect');
        try {
            const response = await fetch('https://api.ipsw.me/v4/devices');
            const devices = await response.json();
            
            select.innerHTML = '<option value="">Select a Device</option>';
            
            const filtered = devices.filter(d => 
                d.identifier.includes('iPhone') || 
                d.identifier.includes('iPad') || 
                d.identifier.includes('iPod')
            );

            filtered.forEach(d => {
                const opt = document.createElement('option');
                opt.value = d.identifier;
                opt.textContent = d.name;
                select.appendChild(opt);
            });
        } catch (e) {
            select.innerHTML = '<option>Error loading devices</option>';
        }
    };

    function toggleMode() {
        isAdvanced = !isAdvanced;
        document.getElementById('standardMode').classList.toggle('hidden');
        document.getElementById('advancedMode').classList.toggle('hidden');
        document.getElementById('modeLabel').textContent = isAdvanced ? 'Choose from a list' : 'Enter Device ID';
    }

    async function search() {
        const id = isAdvanced 
            ? document.getElementById('manualInput').value.trim() 
            : document.getElementById('deviceSelect').value;

        if (!id) return;

        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = '<p style="text-align:center">Fetching all versions...</p>';

        try {
            const response = await fetch(`https://api.ipsw.me/v4/device/${id}`);
            if (!response.ok) throw new Error("Not found");
            const data = await response.json();

            resultsDiv.innerHTML = "";
            data.firmwares
                .sort((a,b) => new Date(b.releasedate) - new Date(a.releasedate))
                .forEach(fw => {
                    resultsDiv.innerHTML += `
                        <div class="fw-item">
                            <div>
                                <div class="fw-name">
                                    <div class="status-dot ${fw.signed ? 'signed' : 'unsigned'}"></div>
                                    iOS ${fw.version}
                                </div>
                                <div class="fw-meta">Build ${fw.buildid} • ${new Date(fw.releasedate).toLocaleDateString()}</div>
                            </div>
                            <a href="${fw.url}" class="dl-icon" target="_blank">Download</a>
                        </div>
                    `;
                });
        } catch (err) {
            resultsDiv.innerHTML = `<p style="color:#f87171; text-align:center">Error: Could not find that device.</p>`;
        }
    }
</script>

</body>
</html>
